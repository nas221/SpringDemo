<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Employee</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      width: 100%;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
      color: #111827;
    }
    p.subtitle {
      margin: 0 0 20px;
      font-size: 14px;
      color: #6b7280;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      background-color: #f9fafb;
    }
    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25);
      background-color: #ffffff;
    }
    .field {
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      margin-top: 6px;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(37, 99, 235, 0.4);
      filter: brightness(1.03);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
      filter: brightness(0.98);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }
    .status.success {
      color: #059669;
    }
    .status.error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add Employee</h1>
    <p class="subtitle">Enter details, then submit.</p>

    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" placeholder="e.g. Alice" />
    </div>

    <div class="field">
      <label for="role">Role</label>
      <input id="role" type="text" placeholder="e.g. Developer" />
    </div>

    <div class="field">
      <label for="dob">Date of birth</label>
      <input id="dob" type="date" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="e.g. alice@company.com" />
    </div>

    <div class="field">
      <label for="department">Department</label>
      <input id="department" type="text" placeholder="e.g. Engineering" />
    </div>

    <button id="submitBtn">Add employee</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    const btn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");

    btn.addEventListener("click", async () => {
      const name = document.getElementById("name").value.trim();
      const role = document.getElementById("role").value.trim();
      const dob = document.getElementById("dob").value;
      const email = document.getElementById("email").value.trim();
      const department = document.getElementById("department").value.trim();

      statusEl.textContent = "";
      statusEl.className = "status";

      if (!name || !role) {
        statusEl.textContent = "Please fill in both fields.";
        statusEl.classList.add("error");
        return;
      }

      try {
        const response = await fetch("/employees/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name,
            role,
            dob: dob || null,
            email: email || null,
            department: department || null,
          }),
        });

        if (response.ok) {
          statusEl.textContent = "Employee added successfully.";
          statusEl.classList.add("success");
          document.getElementById("name").value = "";
          document.getElementById("role").value = "";
          document.getElementById("dob").value = "";
          document.getElementById("email").value = "";
          document.getElementById("department").value = "";
        } else {
          statusEl.textContent = "Failed to add employee (" + response.status + ").";
          statusEl.classList.add("error");
        }
      } catch (err) {
        statusEl.textContent = "Error calling API: " + err;
        statusEl.classList.add("error");
      }
    });
  </script>
</body>
</html>
