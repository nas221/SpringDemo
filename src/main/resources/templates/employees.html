<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employees</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary2: #4f46e5;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 24px;
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 650;
            letter-spacing: -0.02em;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (min-width: 900px) {
            .grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        form {
            display: grid;
            gap: 10px;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 13px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            background: #f9fafb;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
            background: #ffffff;
        }

        button {
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #ffffff;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
        }

        button:hover {
            filter: brightness(1.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        thead th {
            text-align: left;
            font-size: 12px;
            color: var(--muted);
            padding: 10px 12px;
            background: #fafafa;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .nav a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Employees</h1>
            <p>Quick admin UI for your demo API.</p>
        </div>
        <div class="nav">
            <a href="/">Home</a>
        </div>
    </header>

    <div class="grid">
        <section class="card">
            <h2>Add employee</h2>
            <form method="post" action="/employees/ui/add">
                <label>
                    Name
                    <input type="text" name="name" required>
                </label>
                <label>
                    Role
                    <input type="text" name="role" required>
                </label>
                <label>
                    Date of birth
                    <input type="date" name="dob">
                </label>
                <label>
                    Email
                    <input type="email" name="email">
                </label>
                <label>
                    Department
                    <input type="text" name="department">
                </label>
                <button type="submit">Add</button>
            </form>
        </section>

        <section class="card">
            <h2>Update employee</h2>
            <form method="post" action="/employees/ui/update">
                <label>
                    ID
                    <input type="number" name="id" min="1" required>
                </label>
                <label>
                    Name
                    <input type="text" name="name" required>
                </label>
                <label>
                    Role
                    <input type="text" name="role" required>
                </label>
                <label>
                    Date of birth
                    <input type="date" name="dob">
                </label>
                <label>
                    Email
                    <input type="email" name="email">
                </label>
                <label>
                    Department
                    <input type="text" name="department">
                </label>
                <button type="submit">Update</button>
            </form>
        </section>

        <section class="card">
            <h2>Delete employee</h2>
            <form method="post" action="/employees/ui/delete">
                <label>
                    ID
                    <input type="number" name="id" min="1" required>
                </label>
                <button type="submit">Delete</button>
            </form>
        </section>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Role</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Department</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="employee : ${employees}">
            <td th:text="${employee.id}"></td>
            <td th:text="${employee.name}"></td>
            <td th:text="${employee.role}"></td>
            <td th:text="${employee.dob}"></td>
            <td th:text="${employee.email}"></td>
            <td th:text="${employee.department}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
